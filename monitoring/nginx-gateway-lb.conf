# Crew defaults to http://127.0.0.1:8780/v1 — start nginx, then gateway worker(s) on the upstream ports.
# Example: nginx -p /tmp -c "$(pwd)/nginx-gateway-lb.conf"   (from this directory)
# One gateway only: keep a single `server` line in `upstream gateway`.

worker_processes  1;
error_log  /tmp/nginx-gateway-lb.error.log  warn;
pid        /tmp/nginx-gateway-lb.pid;

events {
    worker_connections  1024;
}

http {
    upstream gateway {
        server 127.0.0.1:8765;
        # server 127.0.0.1:8766;
    }

    server {
        listen 8780;
        server_name  _;

        client_max_body_size 64m;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        location / {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
        }
    }
}
